<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibia Homestyler - Simulador</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #f3b137;
            text-shadow: 2px 2px #000;
            margin-bottom: 5px;
        }

        p {
            color: #ccc;
            margin-bottom: 25px;
        }

        /* Container principal */
        .editor-container {
            display: flex;
            gap: 30px;
            background-color: #161616;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Menu de Itens (Paleta) */
        .palette {
            background-color: #222;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #444;
            width: 180px; /* Aumentado ligeiramente para caber melhor os novos nomes */
        }

        .palette h3 {
            margin-top: 0;
            color: #f3b137;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
            text-align: center;
        }

        /* Botão do Menu de Itens */
        .item-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .item-btn img {
            width: 32px;
            height: 32px;
            image-rendering: pixelated;
        }

        .item-btn.selected {
            background-color: #f3b137;
            color: black;
            border-color: #fff;
        }

        /* O Grid da Casa (Sala 4x4) */
        /* Ajustado para 32px por tile e SEM gap para o piso emendar perfeitamente */
        .house-grid {
            display: grid;
            grid-template-columns: repeat(4, 32px);
            grid-template-rows: repeat(4, 32px);
            gap: 0px; 
            background-color: #000;
            padding: 0px;
            border: 3px solid #f3b137;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
        }

        /* Cada quadrado (tile) do chão */
        .tile {
            width: 32px;
            height: 32px;
            background-image: url('images/wooden_tile.gif');
            background-size: 100% 100%; /* Garante que cubra o bloco perfeitamente */
            background-repeat: no-repeat;
            image-rendering: pixelated;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        .tile:hover {
            filter: brightness(1.2);
        }

        /* Imagem do item colocado dentro do tile */
        .tile img {
            width: 32px; /* Itens também no tamanho nativo de 32x32 */
            height: 32px;
            image-rendering: pixelated;
            position: absolute;
            pointer-events: none;
            bottom: 0;
            right: 0;
        }
    </style>
</head>
<body>

    <h1>Tibia Homestyler</h1>
    <p>Selecione um item no menu e clique no chão para começar sua decoração!</p>

    <div class="editor-container">
        <!-- Paleta de Itens -->
        <div class="palette">
            <h3>Itens</h3>
            
            <button class="item-btn selected" onclick="selectItem('Blood_Herb', 'images/Blood_Herb.gif', this)">
                <img src="images/Blood_Herb.gif" alt="Blood Herb">
                <span>Blood Herb</span>
            </button>
            
            <button class="item-btn" onclick="selectItem('Baby_Monster', 'images/Baby_Munster.gif', this)">
                <img src="images/Baby_Munster.gif" alt="Baby Munster">
                <span>Munster</span>
            </button>
            
            <button class="item-btn" onclick="selectItem('Colourful_Balloons', 'images/Colourful_Balloons.gif', this)">
                <img src="images/Colourful_Balloons.gif" alt="Colourful Balloons">
                <span>Balloons</span>
            </button>

            <button class="item-btn" onclick="selectItem('Jewel_Case', 'images/Jewel_Case.gif', this)">
                <img src="images/Jewel_Case.gif" alt="Jewel Case">
                <span>Jewel Case</span>
            </button>
            
            <button class="item-btn" onclick="selectItem('Vazio', '', this)">
                <span style="font-size: 24px; margin-left: 5px; width: 32px;">❌</span>
                <span>Remover</span>
            </button>
        </div>

        <!-- Grid da Casa -->
        <div class="house-grid" id="grid">
            <!-- Os tiles serão gerados pelo JS -->
        </div>
    </div>

    <script>
        // Ajustados para bater exatamente com a primeira opção (Blood_Herb com B e H maiúsculos)
        let selectedItemName = 'Blood_Herb';
        let selectedItemImg = 'images/Blood_Herb.gif';

        function selectItem(name, imgSrc, buttonElement) {
            selectedItemName = name;
            selectedItemImg = imgSrc;
            
            document.querySelectorAll('.item-btn').forEach(btn => btn.classList.remove('selected'));
            buttonElement.classList.add('selected');
        }

        // Gerar o Grid 4x4
        const gridContainer = document.getElementById('grid');
        for (let i = 0; i < 16; i++) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            
            tile.addEventListener('click', () => {
                tile.innerHTML = '';

                if (selectedItemName !== 'Vazio') {
                    const img = document.createElement('img');
                    img.src = selectedItemImg;
                    img.alt = selectedItemName;
                    tile.appendChild(img);
                }
            });

            gridContainer.appendChild(tile);
        }
    </script>
</body>
</html>
