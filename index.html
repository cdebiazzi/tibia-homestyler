<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibia Homestyler - Simulador</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #f3b137;
            text-shadow: 2px 2px #000;
            margin-bottom: 5px;
        }

        p {
            color: #ccc;
            margin-bottom: 25px;
        }

        /* Container principal */
        .editor-container {
            display: flex;
            gap: 30px;
            background-color: #161616;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            align-items: flex-start;
        }

        /* Menu de Itens (Paleta) */
        .palette {
            background-color: #222;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #444;
            width: 180px;
        }

        .palette h3 {
            margin-top: 0;
            color: #f3b137;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
            text-align: center;
        }

        /* Botão do Menu de Itens */
        .item-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .item-btn img {
            width: 32px;
            height: 32px;
            image-rendering: pixelated;
        }

        .item-btn.selected {
            background-color: #f3b137;
            color: black;
            border-color: #fff;
        }

        /* Botão de Ação Especial (Limpar) */
        .action-btn {
            background-color: #8b0000;
            color: white;
            border: 1px solid #a00;
            margin-top: 15px;
        }
        
        .action-btn:hover {
            background-color: #b22222;
        }

        /* Área da Casa */
        .house-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .house-title {
            color: #f3b137;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* O Grid da Casa (Casa Quadrada de 25 sqm: 5x5) */
        /* Ajustado de forma compacta para alinhar as texturas milimetricamente */
        .house-grid {
            display: grid;
            grid-template-columns: repeat(5, 32px);
            grid-template-rows: repeat(5, 32px);
            gap: 0px; 
            background-color: #000;
            padding: 0px;
            border: 4px solid #4a3b2c; /* Borda cor de madeira/parede antiga */
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
        }

        /* Cada quadrado (tile) do chão */
        .tile {
            width: 32px;
            height: 32px;
            background-image: url('images/Wooden_Tile.gif');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            image-rendering: pixelated;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        /* Efeito sutil ao passar o mouse para saber onde está clicando */
        .tile:hover::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 1px solid rgba(243, 177, 55, 0.5);
            pointer-events: none;
        }

        /* Imagem do item colocado dentro do tile */
        .tile img {
            width: 32px;
            height: 32px;
            image-rendering: pixelated;
            position: absolute;
            pointer-events: none;
            bottom: 0;
            right: 0;
        }
    </style>
</head>
<body>

    <h1>Tibia Homestyler</h1>
    <p>Selecione um item no menu e monte a decoração da sua casa!</p>

    <div class="editor-container">
        <!-- Paleta de Itens -->
        <div class="palette">
            <h3>Itens</h3>
            
            <button class="item-btn selected" onclick="selectItem('Blood_Herb', 'images/Blood_Herb.gif', this)">
                <img src="images/Blood_Herb.gif" alt="Blood Herb">
                <span>Blood Herb</span>
            </button>
            
            <button class="item-btn" onclick="selectItem('Baby_Monster', 'images/Baby_Munster.gif', this)">
                <img src="images/Baby_Munster.gif" alt="Baby Munster">
                <span>Munster</span>
            </button>
            
            <button class="item-btn" onclick="selectItem('Colourful_Balloons', 'images/Colourful_Balloons.gif', this)">
                <img src="images/Colourful_Balloons.gif" alt="Colourful Balloons">
                <span>Balloons</span>
            </button>

            <button class="item-btn" onclick="selectItem('Jewel_Case', 'images/Jewel_Case.gif', this)">
                <img src="images/Jewel_Case.gif" alt="Jewel Case">
                <span>Jewel Case</span>
            </button>
            
            <button class="item-btn" onclick="selectItem('Vazio', '', this)">
                <span style="font-size: 20px; margin-left: 5px; width: 32px;">❌</span>
                <span>Remover</span>
            </button>

            <!-- Botão de Limpar Tudo -->
            <button class="item-btn action-btn" onclick="clearHouse()">
                <span style="font-size: 20px; margin-left: 5px; width: 32px;">🧹</span>
                <span>Limpar Casa</span>
            </button>
        </div>

        <!-- Área da Casa (Centralizada e bem apresentada) -->
        <div class="house-area">
            <div class="house-title">Sua Casa (25 SQM)</div>
            <div class="house-grid" id="grid">
                <!-- Os 25 tiles serão gerados pelo JS -->
            </div>
        </div>
    </div>

    <script>
        let selectedItemName = 'Blood_Herb';
        let selectedItemImg = 'images/Blood_Herb.gif';

        function selectItem(name, imgSrc, buttonElement) {
            selectedItemName = name;
            selectedItemImg = imgSrc;
            
            document.querySelectorAll('.item-btn').forEach(btn => btn.classList.remove('selected'));
            buttonElement.classList.add('selected');
        }

        // Gerar o Grid 5x5 (25 SQM)
        const gridContainer = document.getElementById('grid');
        const totalTiles = 25; // 5 de largura x 5 de altura

        for (let i = 0; i < totalTiles; i++) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            
            tile.addEventListener('click', () => {
                tile.innerHTML = '';

                if (selectedItemName !== 'Vazio') {
                    const img = document.createElement('img');
                    img.src = selectedItemImg;
                    img.alt = selectedItemName;
                    tile.appendChild(img);
                }
            });

            gridContainer.appendChild(tile);
        }

        // Função para remover todos os itens da casa de uma vez só
        function clearHouse() {
            const allTiles = document.querySelectorAll('.tile');
            allTiles.forEach(tile => {
                tile.innerHTML = '';
            });
        }
    </script>
</body>
</html>
