<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibia Homestyler - Wood Avenue 6a</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #f3b137;
            text-shadow: 2px 2px #000;
            margin-bottom: 5px;
        }

        p {
            color: #ccc;
            margin-bottom: 25px;
        }

        .editor-container {
            display: flex;
            gap: 30px;
            background-color: #161616;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            align-items: flex-start;
        }

        .palette {
            background-color: #222;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #444;
            width: 180px;
        }

        .palette h3 {
            margin-top: 0;
            color: #f3b137;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
            text-align: center;
        }

        .item-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .item-btn img {
            width: 32px;
            height: 32px;
            image-rendering: pixelated;
        }

        .item-btn.selected {
            background-color: #f3b137;
            color: black;
            border-color: #fff;
        }

        .action-btn {
            background-color: #8b0000;
            color: white;
            border: 1px solid #a00;
            margin-top: 15px;
        }
        
        .action-btn:hover {
            background-color: #b22222;
        }

        .house-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .house-title {
            color: #f3b137;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Grid limpo e sem folgas */
        .house-grid {
            display: grid;
            grid-template-columns: repeat(6, 32px);
            grid-template-rows: repeat(5, 32px);
            gap: 0px; 
            background-color: #111;
            padding: 0px;
            border: 4px solid #111;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            /* Importante para permitir que as paredes e a porta se sobreponham na parte de baixo */
            overflow: visible; 
        }

        /* Estilo base de cada quadrado (Tile) */
        .tile {
            width: 32px;
            height: 32px;
            box-sizing: border-box;
            image-rendering: pixelated;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 0: Chão de Madeira Decorável */
        .tile.floor {
            background-color: #3e2718; 
            background-image: url('images/Wooden_Tile.gif');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            cursor: pointer;
        }

        /* 1: Parede de Edron - Com ajuste de sobreposição (Tibia Style) */
        .tile.wall {
            background-color: #d1cbd4; 
            background-image: url('images/Edron_Wall.gif'); 
            background-size: 100% 100%;
            cursor: not-allowed;
            z-index: 2; /* Fica acima do chão */
        }

        /* 2: Porta de Edron - Agora com a proporção real de sobreposição */
        .tile.door {
            background-color: transparent; 
            cursor: not-allowed;
            z-index: 3; /* Portas ficam sempre na camada superior */
        }

        /* Criamos um elemento interno para a porta poder "vazar" os limites do quadrado de 32px */
        .tile.door::after {
            content: '';
            position: absolute;
            bottom: 0; /* Alinha na base do tile */
            left: 0;
            width: 32px;
            height: 48px; /* Portas de Tibia têm geralmente 48px ou 64px de altura para sobrepor o teto/chão */
            background-image: url('images/Edron_Door.gif');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            image-rendering: pixelated;
            pointer-events: none;
        }

        /* Efeito de hover */
        .tile.floor:hover::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 1px solid rgba(243, 177, 55, 0.6);
            pointer-events: none;
            z-index: 10;
        }

        /* Imagem do item decorativo colocado */
        .tile img.item {
            width: 32px;
            height: 32px;
            image-rendering: pixelated;
            position: absolute;
            pointer-events: none;
            bottom: 0;
            right: 0;
            z-index: 5;
        }
    </style>
</head>
<body>

    <h1>Tibia Homestyler</h1>
    <p>Simulador de Decoração - Edron Edition</p>

    <div class="editor-container">
        <!-- Menu Lateral -->
        <div class="palette">
            <h3>Itens</h3>
            
            <button class="item-btn selected" onclick="selectItem('Blood_Herb', 'images/Blood_Herb.gif', this)">
                <img src="images/Blood_Herb.gif" alt="Blood Herb">
                <span>Blood Herb</span>
            </button>
            
            <button class="item-btn" onclick="selectItem('Baby_Monster', 'images/Baby_Munster.gif', this)">
                <img src="images/Baby_Munster.gif" alt="Baby Munster">
                <span>Munster</span>
            </button>
            
            <button class="item-btn" onclick="selectItem('Colourful_Balloons', 'images/Colourful_Balloons.gif', this)">
                <img src="images/Colourful_Balloons.gif" alt="Colourful Balloons">
                <span>Balloons</span>
            </button>

            <button class="item-btn" onclick="selectItem('Jewel_Case', 'images/Jewel_Case.gif', this)">
                <img src="images/Jewel_Case.gif" alt="Jewel Case">
                <span>Jewel Case</span>
            </button>
            
            <button class="item-btn" onclick="selectItem('Vazio', '', this)">
                <span style="font-size: 20px; margin-left: 5px; width: 32px;">❌</span>
                <span>Remover</span>
            </button>

            <button class="item-btn action-btn" onclick="clearHouse()">
                <span style="font-size: 20px; margin-left: 5px; width: 32px;">🧹</span>
                <span>Limpar Casa</span>
            </button>
        </div>

        <!-- Área da Casa -->
        <div class="house-area">
            <div class="house-title">Wood Avenue 6a (Edron - 30 SQM)</div>
            <div class="house-grid" id="grid">
                <!-- Gerado dinamicamente via JS -->
            </div>
        </div>
    </div>

    <script>
        let selectedItemName = 'Blood_Herb';
        let selectedItemImg = 'images/Blood_Herb.gif';

        function selectItem(name, imgSrc, buttonElement) {
            selectedItemName = name;
            selectedItemImg = imgSrc;
            document.querySelectorAll('.item-btn').forEach(btn => btn.classList.remove('selected'));
            buttonElement.classList.add('selected');
        }

        /* 
           MAPA REAL DA WOOD AVENUE 6a (6x5):
           1 = Parede de Edron
           0 = Chão de Madeira Decorável
           2 = Porta de Entrada (Fica embaixo, na direita)
        */
        const houseMap = [
            [1, 1, 1, 1, 1, 1], // Parede de trás
            [1, 0, 0, 1, 0, 1], // Quarto esquerdo | Divisória | Sala direita
            [1, 0, 0, 0, 0, 1], // Passagem livre
            [1, 0, 0, 1, 0, 1], // Quarto esquerdo | Divisória | Sala direita
            [1, 1, 1, 1, 2, 1]  // Parede da frente com a porta de Edron
        ];

        const gridContainer = document.getElementById('grid');

        // Limpa o grid antes de gerar (para evitar tiles duplicados ou pretos do cache)
        gridContainer.innerHTML = '';

        for (let row = 0; row < houseMap.length; row++) {
            for (let col = 0; col < houseMap[row].length; col++) {
                const tileType = houseMap[row][col];
                const tile = document.createElement('div');
                tile.classList.add('tile');

                if (tileType === 1) {
                    tile.classList.add('wall');
                } else if (tileType === 2) {
                    tile.classList.add('door');
                } else {
                    tile.classList.add('floor');

                    tile.addEventListener('click', () => {
                        const existingImg = tile.querySelector('.item');
                        if (existingImg) {
                            existingImg.remove();
                        }

                        if (selectedItemName !== 'Vazio') {
                            const img = document.createElement('img');
                            img.src = selectedItemImg;
                            img.alt = selectedItemName;
                            img.classList.add('item');
                            tile.appendChild(img);
                        }
                    });
                }

                gridContainer.appendChild(tile);
            }
        }

        function clearHouse() {
            const allFloors = document.querySelectorAll('.tile.floor');
            allFloors.forEach(tile => {
                const item = tile.querySelector('.item');
                if (item) item.remove();
            });
        }
    </script>
</body>
</html>
