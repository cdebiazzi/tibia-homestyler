<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibia Decorator - Protótipo</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #f3b137;
        }

        /* Container principal */
        .editor-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        /* Menu de Itens (Paleta) */
        .palette {
            background-color: #2b2b2b;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #555;
        }

        .item-btn {
            display: block;
            width: 120px;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #444;
            color: white;
            border: 1px solid #666;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        .item-btn.selected {
            background-color: #f3b137;
            color: black;
            border-color: #fff;
        }

        /* O Grid da Casa (Sala 4x4) */
        .house-grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 2px;
            background-color: #444;
            padding: 5px;
            border: 3px solid #f3b137;
        }

        /* Cada quadrado (tile) do chão */
        .tile {
            background-color: #5c5c5c; /* Cor de chão de pedra */
            border: 1px solid #666;
            display: flex;
            align-items: center;
            justify-center: center;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .tile:hover {
            background-color: #777;
        }
    </style>
</head>
<body>

    <h1>Meu Simulador de Tibia</h1>
    <p>Selecione um item à esquerda e clique em um quadrado do mapa para decorar!</p>

    <div class="editor-container">
        <!-- Paleta de Itens -->
        <div class="palette">
            <h3>Itens</h3>
            <button class="item-btn selected" onclick="selectItem('Blood Herb', this)">Blood Herb 🌿</button>
            <button class="item-btn" onclick="selectItem('Box', this)">Crate/Box 📦</button>
            <button class="item-btn" onclick="selectItem('Trophy', this)">Demon Trophy 😈</button>
            <button class="item-btn" onclick="selectItem('Vazio', this)">Remover ❌</button>
        </div>

        <!-- Grid da Casa -->
        <div class="house-grid" id="grid">
            <!-- Os quadrados (tiles) serão gerados aqui pelo JavaScript -->
        </div>
    </div>

    <script>
        // Item atualmente selecionado para colocar no chão
        let selectedItem = 'Blood Herb';

        // Função para mudar o item selecionado no menu lateral
        function selectItem(itemName, buttonElement) {
            selectedItem = itemName;
            
            // Remove a classe 'selected' de todos os botões e adiciona no atual
            document.querySelectorAll('.item-btn').forEach(btn => btn.classList.remove('selected'));
            buttonElement.classList.add('selected');
        }

        // Gerar o Grid 4x4 dinamicamente
        const gridContainer = document.getElementById('grid');
        for (let i = 0; i < 16; i++) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            
            // Evento de clique para colocar ou remover o item no quadrado
            tile.addEventListener('click', () => {
                if (selectedItem === 'Vazio') {
                    tile.innerText = '';
                    tile.style.backgroundColor = '#5c5c5c'; // Cor padrão do chão
                } else {
                    tile.innerText = selectedItem;
                    tile.style.backgroundColor = '#3d4d3d'; // Cor amigável para destacar que tem item
                }
            });

            gridContainer.appendChild(tile);
        }
    </script>
</body>
</html>
